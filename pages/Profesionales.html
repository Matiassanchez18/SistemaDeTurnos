<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../style/Profesionales.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <div class="d-flex flex-column flex-shrink-0 p-3 bg-light sideBar">
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
        >
          <span class="fs-4">Control Turnos</span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto mt-3">
          <li>
            <a href="../Index.html" class="nav-link link-dark"> Inicio </a>
          </li>
          <li>
            <a href="./Turnos.html" class="nav-link link-dark"> Turnos </a>
          </li>
          <li class="nav-item">
            <a
              href="./Pacientes.html"
              class="nav-link active"
              aria-current="page"
            >
              Profesionales
            </a>
          </li>
          <li>
            <a href="./Profesionales.html" class="nav-link link-dark">
              Pacientes
            </a>
          </li>
        </ul>
        <hr />
      </div>
    </header>
    <main class="mainAdaptativo">
      <section class="container mt-5">
        <div class="d-flex justify-content-between align-items-center">
          <h2 class="mb-0 border-bottom p-1">Profesionales</h2>
          <p class="mb-0">
            <i class="bi bi-circle-fill text-primary"></i>Admin
          </p>
        </div>
      </section>
      <section class="container mt-4">
        <table class="table table-striped">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Nombre</th>
              <th scope="col">Especialidad</th>
              <th scope="col">NRO Matricula</th>
              <th scope="col">Dias de atencion</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th scope="row">1</th>
              <td>Mark</td>
              <td>Otto</td>
              <td>@mdo</td>
              <td>@mdo</td>
            </tr>
            <tr>
              <th scope="row">2</th>
              <td>Jacob</td>
              <td>Thornton</td>
              <td>Thornton</td>
              <td>@fat</td>
            </tr>
            <tr>
              <th scope="row">3</th>
              <td>John</td>
              <td>John</td>
              <td>Doe</td>
              <td>@social</td>
            </tr>
          </tbody>
        </table>
        <div class="d-flex justify-content-center mt-4">
          <button
            class="btn btn-dark me-4"
            data-bs-toggle="modal"
            data-bs-target="#Modal"
          >
            <i class="bi bi-plus"></i>Nuevo profesional
          </button>
          <a class="btn btn-dark me-4"
            ><i class="bi bi-plus"></i>Nuevo paciente</a
          >
          <button class="btn btn-dark me-4">
            <i class="bi bi-clipboard2-data-fill me-3"></i>Ver estadistica
          </button>
        </div>
      </section>
    </main>
    <footer></footer>

    <!-- modal -->
    <div
      class="modal fade"
      id="Modal"
      tabindex="-1"
      aria-labelledby="ModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="ModalLabel">Modal title</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">...</div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-primary">Save changes</button>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/Profesionales.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </body>
</html>
