<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../style/Profesionales.css" />
    <title>Profesionales</title>
  </head>
  <body>
    <header>
      <div class="d-flex flex-column flex-shrink-0 p-3 bg-light sideBar">
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
        >
          <span class="fs-4">Control Turnos</span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto mt-3">
          <li>
            <a href="../Index.html" class="nav-link link-dark"> Inicio </a>
          </li>
          <li>
            <a href="./admin.html" class="nav-link link-dark"> Turnos </a>
          </li>
          <li class="nav-item">
            <a
              href="./Profesionales.html"
              class="nav-link active"
              aria-current="page"
            >
              Profesionales
            </a>
          </li>
          <li>
            <a href="./pacientes.html" class="nav-link link-dark">
              Pacientes
            </a>
          </li>
        </ul>
        <hr />
      </div>
    </header>
    <main class="mainAdaptativo">
      <section class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center">
          <h2 class="mb-0 border-bottom p-1">Profesionales</h2>
          <p class="mb-0">
            <i class="bi bi-circle-fill text-primary"></i>Admin
          </p>
        </div>
      </section>
      <section class="container mt-5">
        <table class="table table-striped">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Nombre</th>
              <th scope="col">Especialidad</th>
              <th scope="col">NRO Matricula</th>
              <th scope="col">Dias de atencion</th>
              <th scope="col">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
        <div class="d-flex justify-content-center mt-4">
          <button
            class="btn btn-primary me-4"
            data-bs-toggle="modal"
            data-bs-target="#Modal"
            onclick="limpiarFormulario()"
          >
            <i class="bi bi-plus"></i>Nuevo profesional
          </button>
          <a class="btn btn-primary me-4"
            ><i class="bi bi-plus"></i>Nuevo paciente</a
          >
          <button class="btn btn-primary me-4">
            <i class="bi bi-clipboard2-data-fill me-3"></i>Ver estadistica
          </button>
        </div>
      </section>
    </main>
    <footer></footer>

    <!-- modal -->
    <div
      class="modal fade"
      id="Modal"
      tabindex="-1"
      aria-labelledby="ModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="ModalLabel">
              Agregar profesional
            </h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label for="Nombre" class="form-label">Nombre completo</label>
                <input
                  type="text"
                  class="form-control"
                  id="Nombre"
                  placeholder="ej: Pedro Juarez"
                  required
                  minlength="5"
                  maxlength="100"
                />
              </div>
              <div class="mb-3">
                <label for="Matricula" class="form-label">Matricula</label>
                <input
                  type="text"
                  class="form-control"
                  id="Matricula"
                  required
                  minlength="10"
                  maxlength="10"
                  placeholder="ej: 56471923"
                />
              </div>
              <div class="mb-3">
                <label for="Especialidad" class="form-label"
                  >Especialidad</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="Especialidad"
                  required
                  minlength="4"
                  maxlength="50"
                  placeholder="ej: Radiologo"
                />
              </div>
              <div class="mb-3">
                <label for="diasatencion" class="form-label"
                  >dias disponibiles</label
                >

                <input
                  type="text"
                  class="form-control"
                  id="diasatencion"
                  required
                  minlength="4"
                  maxlength="50"
                  placeholder="ej: Lunes,Martes y Miercoles"
                />
                <div class="form-text">Escriba los dias sin ",".</div>
              </div>

              <button id="btnEnviar" type="button" class="btn btn-primary">
                Enviar
              </button>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              cerrar
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/Profesionales.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
