<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../style/Admin.css" />
    <title>Sistema de turnos</title>
  </head>
  <body>
    <header>
      <div class="d-flex flex-column flex-shrink-0 p-3 bg-light sideBar">
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
        >
          <span class="fs-4">Control Turnos</span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto mt-3">
          <li>
            <a href="../Index.html" class="nav-link link-dark">Inicio</a>
          </li>
          <li>
            <a href="./admin.html" class="nav-link link-dark active">Turnos</a>
          </li>
          <li class="nav-item">
            <a href="./Profesionales.html" class="nav-link link-dark" aria-current="page">
              Profesionales
            </a>
          </li>
          <li>
            <a href="./pacientes.html" class="nav-link link-dark">Pacientes</a>
          </li>
        </ul>
        <hr />
      </div>
    </header>

    <main class="mainAdaptativo">
      <section class="container">
        <section class="container mt-5 mb-5">
          <div class="d-flex justify-content-between align-items-center">
            <h2 class="mb-0 border-bottom p-1">Turnos</h2>
            <p class="mb-0">
              <i class="bi bi-circle-fill text-primary"></i>Admin
            </p>
          </div>
        </section>
      </section>

      <section class="d-flex justify-content-between mb-5">
        <div class="col-md-6 col-lg-3 col-sm-12 border container rounded-2 border-black p-2 me-1">
          <h4>Pacientes registrados</h4>
          <h3 id="PacientesRegistrados">200</h3>
          <a href="./pacientes.html" class="btn btn-primary">Ver pacientes</a>
        </div>
        <div class="col-md-6 col-lg-3 col-sm-12 border container rounded-2 border-black p-2 me-1">
          <h4>Medicos/Profesionales</h4>
          <h3 id="MedicosProfesionales">69</h3>
          <a href="./Profesionales.html" class="btn btn-primary">Profesionales</a>
        </div>
        <div class="col-md-6 col-lg-3 col-sm-12 border container rounded-2 border-black p-2 me-1">
          <h4>Turnos</h4>
          <h3 id="Turnos">40</h3>
        </div>
        <div class="col-md-6 col-lg-3 col-sm-12 border container rounded-2 border-black p-2 me-1">
        <h4>Turnos terminados</h4>
        <h3 id="TurnosTerminados">0</h3>
        </div>
      </section>

      <section class="container mt-5">
        <table class="table table-striped">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Fecha</th>
              <th scope="col">Hora</th>
              <th scope="col">ID Paciente</th>
              <th scope="col">ID Medico</th>
              <th scope="col">Estado</th>
              <th scope="col">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaTurnos"></tbody>
        </table>

        <div class="d-flex justify-content-center mt-4">
          <button
            type="button"
            class="btn btn-primary me-4"
            data-bs-toggle="modal"
            data-bs-target="#ModalTurno"
          >
            <i class="bi bi-plus"></i> Nuevo Turno
          </button>
        </div>
      </section>
    </main>

    <div
      class="modal fade"
      id="ModalTurno"
      tabindex="-1"
      aria-labelledby="ModalTurnoLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="ModalTurnoLabel">Nuevo Turno</h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label for="Fecha" class="form-label">Fecha</label>
                <input type="date" class="form-control" id="Fecha" required />
              </div>
              <div class="mb-3">
                <label for="Hora" class="form-label">Hora</label>
                <input type="time" class="form-control" id="Hora" required />
              </div>
              <div class="mb-3">
                <label for="PacienteId" class="form-label">ID Paciente</label>
                <input
                  type="text"
                  class="form-control"
                  id="PacienteId"
                  placeholder="ej: GR1Lkc7-Ypw"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="ProfesionalId" class="form-label">ID Profesional</label>
                <input
                  type="text"
                  class="form-control"
                  id="ProfesionalId"
                  placeholder="ej: VW_d-L-0Ei4"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="Estado" class="form-label">Estado</label>
                <select class="form-select" id="Estado" required>
                  <option value="🟠">🟠 Pendiente</option>
                  <option value="🟢">🟢 Confirmado</option>
                  <option value="🔴">🔴 Cancelado</option>
                </select>
              </div>
              <button id="btnEnviar" type="button" class="btn btn-primary">
                Confirmar
              </button>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/admin.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
