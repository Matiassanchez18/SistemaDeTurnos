<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Pacientes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../style/Pacientes.css" />
  </head>

  <body>
    <header>
      <div class="d-flex flex-column flex-shrink-0 p-3 bg-light sideBar">
        <a
          href="../Index.html"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
        >
          <span class="fs-4">Control Turnos</span>
        </a>
        <hr />
        <ul class="nav nav-pills flex-column mb-auto mt-3">
          <li>
            <a href="../Index.html" class="nav-link link-dark"> Inicio </a>
          </li>
          <li>
            <a href="./admin.html" class="nav-link link-dark"> Turnos </a>
          </li>
          <li>
            <a href="./Profesionales.html" class="nav-link link-dark">
              Profesionales
            </a>
          </li>
          <li class="nav-item">
            <a
              href="./Pacientes.html"
              class="nav-link active"
              aria-current="page"
            >
              Pacientes
            </a>
          </li>
        </ul>
        <hr />
      </div>
    </header>

    <main class="mainAdaptativo">
      <section class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center">
          <h2 class="mb-0 border-bottom p-1">Pacientes</h2>
          <p class="mb-0">
            <i class="bi bi-circle-fill text-primary"></i>Admin
          </p>
        </div>
      </section>

      <section class="container mt-5 mb-5">
        <table class="table">
          <thead>
            <tr>
              <th scope="col"># Id</th>
              <th scope="col">Nombre</th>
              <th scope="col">DNI</th>
              <th scope="col">Fecha Nacimiento</th>
              <th scope="col">Telefono</th>
              <th scope="col">Obra Social</th>
              <th scope="col">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </section>

      <div class="d-flex justify-content-center mt-4">
        <button
          type="button"
          class="btn btn-primary me-4"
          data-bs-toggle="modal"
          data-bs-target="#ModalPacientes"
        >
          <i class="bi bi-plus"></i>
          Nuevo Paciente
        </button>

        <a class="btn btn-primary me-4" href="./Profesionales.html"
          ><i class="bi bi-plus"></i>
          Nuevo Profesional
        </a>

        <a href="./error404.html" type="button" class="btn btn-primary me-4 link-underline-opacity-0">
          <i class="bi bi-clipboard2-data-fill me-3"></i>
          Ver Estadísticas
        </a>
      </div>
    </main>

    <!-- modal -->
    <div
      class="modal fade"
      id="ModalPacientes"
      tabindex="-1"
      aria-labelledby="ModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="ModalLabel">Agregar Paciente</h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label for="Nombre" class="form-label">Nombre Completo</label>
                <input
                  type="text"
                  class="form-control"
                  id="Nombre"
                  placeholder="ej: Pedro Juarez"
                  required
                  minlength="5"
                  maxlength="100"
                />
              </div>
              <div class="mb-3">
                <label for="DNI" class="form-label">DNI</label>
                <input
                  type="text"
                  class="form-control"
                  id="DNI"
                  required
                  minlength="8"
                  maxlength="8"
                  placeholder="ej: 44123546"
                />
              </div>
              <div class="mb-3">
                <label for="Fecha" class="form-label"
                  >Fecha de Nacimiento</label
                >

                <input
                  type="date"
                  class="form-control"
                  id="FechaNacimiento"
                  required
                  placeholder="ej:1990-04-12"
                />
              </div>
              <div class="mb-3">
                <label for="telefono" class="form-label">Telefono</label>

                <input
                  type="text"
                  class="form-control"
                  id="Telefono"
                  required
                  minlength="10"
                  maxlength="10"
                  placeholder="ej: 38123546272"
                />
              </div>
              <div class="mb-3">
                <label for="ObraSocial" class="form-label">Obra Social</label>
                <input
                  type="text"
                  class="form-control"
                  id="ObraSocial"
                  placeholder="ej: OSDE"
                />
              </div>

              <button id="btnEnviar" type="button" class="btn btn-primary">
                Enviar
              </button>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/Pacientes.js"></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
